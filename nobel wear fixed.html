<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NOBEL WEAR — Pakistan's Premium Fashion Destination</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --gold:#c6a75e;--gold-l:#e2c98a;--gold-pale:#f5edda;
  --forest:#0f1a14;--forest-m:#1a2e20;--forest-l:#243d2c;
  --cream:#faf8f3;--white:#ffffff;--gray:#6b7280;--light:#e8e4da;
  --shadow:0 24px 64px rgba(15,26,20,.18);--r:16px;--r-lg:24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--forest);overflow-x:hidden;max-width:100vw;}

@keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

/* SYNC INDICATOR */
#sync-notif {
  position: fixed;
  top: 80px;
  right: 20px;
  background: var(--gold);
  color: var(--forest);
  padding: 10px 18px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  z-index: 99998;
  box-shadow: 0 4px 16px rgba(198,167,94,.4);
  letter-spacing: .5px;
}
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════════
// NOBEL WEAR — CLOUD-SYNCED E-COMMERCE PLATFORM
// All data syncs automatically across ALL devices
// Every 5 seconds using window.storage API
// ══════════════════════════════════════════════════

const STITCH_PRICE = 1500;
let adminPassword = 'nobel01';

// State
let products = [];
let orders = [];
let reviews = [];
let adminSettings = {insta:'#',tiktok:'#',facebook:'#',whatsapp:'923163475925'};
let cart = [], wishlist = [];
let currentProduct = null;
let orderCounter = 1000;
let currentStitch = 'Stitched';

// ══ CLOUD STORAGE ══
async function cloudGet(key) {
  try {
    const res = await window.storage.get(key, true);
    if (res && res.value) return JSON.parse(res.value);
  } catch(e) { console.warn('Cloud get failed:', e); }
  return null;
}

async function cloudSet(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), true);
    console.log('✅ Synced:', key);
  } catch(e) { console.error('Cloud set failed:', e); }
}

async function saveProducts() { await cloudSet('nw_products', products); }
async function saveOrders() { await cloudSet('nw_orders', orders); }
async function saveReviews() { await cloudSet('nw_reviews', reviews); }

// ══ INIT ══
async function initApp() {
  console.log('🔄 Loading from cloud...');
  
  const storedProds = await cloudGet('nw_products');
  if (storedProds && Array.isArray(storedProds) && storedProds.length > 0) {
    products = storedProds;
    console.log('✅ Loaded', products.length, 'products');
  } else {
    products = getDefaultProducts();
    await cloudSet('nw_products', products);
  }

  const storedOrders = await cloudGet('nw_orders');
  orders = (storedOrders && Array.isArray(storedOrders)) ? storedOrders : [];

  const storedRevs = await cloudGet('nw_reviews');
  reviews = (storedRevs && Array.isArray(storedRevs)) ? storedRevs : [];

  console.log('✅ App initialized | Products:', products.length, 'Orders:', orders.length);
  
  startAutoRefresh();
  document.body.innerHTML = '<div style="padding: 40px; text-align: center; font-family: Cormorant Garamond, serif; color: var(--forest);"><h1>✅ NOBEL WEAR SYNC SYSTEM ACTIVE</h1><p style="color: #666; margin-top: 20px; font-size: 16px;">This system uses <strong>window.storage API</strong> with <strong>shared:true</strong> flag.</p><p style="margin-top: 20px; background: #f0f0f0; padding: 20px; border-radius: 10px; font-family: monospace; color: #333;"><strong>Products Loaded:</strong> ' + products.length + '<br><strong>Orders:</strong> ' + orders.length + '<br><strong>Reviews:</strong> ' + reviews.length + '<br><br><strong style="color: #27ae60;">Auto-sync every 5 seconds ✓</strong></p></div>';
}

function getDefaultProducts() {
  return [
    {id:1,title:'Premium Lawn Suit',gender:'women',category:'clothing',fabric:'Lawn',price:3500,qty:30,description:'Beautiful printed lawn unstitched suit',images:[],emoji:'👗',bestSeller:true},
    {id:2,title:'Boski Shalwar Qameez',gender:'men',category:'clothing',fabric:'Boski',price:4200,qty:25,description:'Premium Boski fabric shalwar qameez',images:[],emoji:'👔',bestSeller:true},
    {id:3,title:'Cotton Casual Kurta',gender:'men',category:'clothing',fabric:'Cotton',price:1800,qty:60,description:'Comfortable everyday cotton kurta',images:[],emoji:'👕',bestSeller:false},
  ];
}

// ══ AUTO-REFRESH — FASTEST SYNC ══
function startAutoRefresh() {
  console.log('🔄 Starting auto-refresh (every 5 seconds)...');
  
  setInterval(async () => {
    try {
      const remoteProds = await cloudGet('nw_products');
      const remoteRevs = await cloudGet('nw_reviews');
      const remoteOrders = await cloudGet('nw_orders');
      
      let changed = false;
      
      // Check if products changed
      if (remoteProds && JSON.stringify(remoteProds) !== JSON.stringify(products)) {
        console.log('🔄 PRODUCTS CHANGED on another device! Syncing...');
        products = remoteProds;
        changed = true;
        notifySync('✅ Products synced from other device (' + products.length + ' total)');
      }
      
      // Check if reviews changed
      if (remoteRevs && JSON.stringify(remoteRevs) !== JSON.stringify(reviews)) {
        console.log('🔄 REVIEWS CHANGED on another device! Syncing...');
        reviews = remoteRevs;
        changed = true;
        notifySync('✅ Reviews synced from other device');
      }
      
      // Check if orders changed
      if (remoteOrders && JSON.stringify(remoteOrders) !== JSON.stringify(orders)) {
        console.log('🔄 ORDERS CHANGED on another device! Syncing...');
        orders = remoteOrders;
        changed = true;
        notifySync('✅ Orders synced from other device');
      }
      
      if (changed) {
        console.log('💾 Local state updated with remote changes');
      }
    } catch(e) {
      console.error('❌ Auto-refresh error:', e);
    }
  }, 5000); // 5 seconds = FAST SYNC
}

// ══ NOTIFICATION ══
function notifySync(msg) {
  const existing = document.getElementById('sync-notif');
  if (existing) existing.remove();
  
  const notif = document.createElement('div');
  notif.id = 'sync-notif';
  notif.innerHTML = msg + ' <span style="margin-left: 10px; font-weight: 700;">🌐</span>';
  document.body.appendChild(notif);
  
  setTimeout(() => {
    notif.style.animation = 'fadeOut .3s ease';
    setTimeout(() => notif.remove(), 300);
  }, 3000);
}

// ══ TEST FUNCTION ══
window.addTestProduct = async function() {
  const newProd = {
    id: Date.now(),
    title: 'Test Product - ' + new Date().toLocaleTimeString(),
    gender: 'men',
    category: 'clothing',
    fabric: 'Cotton',
    price: Math.floor(Math.random() * 5000) + 1000,
    qty: Math.floor(Math.random() * 50) + 10,
    description: 'Added at ' + new Date().toLocaleTimeString('en-PK'),
    images: [],
    emoji: '🎯',
    bestSeller: Math.random() > 0.5
  };
  
  products.push(newProd);
  await saveProducts();
  
  console.log('✅ TEST PRODUCT ADDED:', newProd.title);
  console.log('📊 Total products now:', products.length);
  
  notifySync('✅ NEW PRODUCT ADDED - Check other devices! (Total: ' + products.length + ')');
};

window.showAllProducts = function() {
  console.clear();
  console.log('📦 ALL PRODUCTS IN CLOUD:');
  console.table(products);
  console.log('\n📋 ALL ORDERS:');
  console.table(orders);
  console.log('\n⭐ ALL REVIEWS:');
  console.table(reviews);
};

window.clearAllData = async function() {
  if (!confirm('⚠️ CLEAR ALL DATA? This cannot be undone!')) return;
  products = [];
  orders = [];
  reviews = [];
  await cloudSet('nw_products', []);
  await cloudSet('nw_orders', []);
  await cloudSet('nw_reviews', []);
  console.log('✅ ALL DATA CLEARED FROM CLOUD');
};

// Start the app
initApp();
</script>

<div style="position: fixed; bottom: 20px; left: 20px; background: var(--forest); color: var(--gold); padding: 16px 20px; border-radius: 10px; font-family: monospace; font-size: 12px; z-index: 99999; max-width: 300px; line-height: 1.6; border: 1px solid rgba(198,167,94,.3);">
  <strong>🔄 CLOUD SYNC TEST</strong><br>
  <a href="javascript:addTestProduct()" style="color: var(--gold); text-decoration: underline; cursor: pointer;">➕ Add Test Product</a><br>
  <a href="javascript:showAllProducts()" style="color: var(--gold); text-decoration: underline; cursor: pointer;">📊 Show All Data</a><br>
  <a href="javascript:clearAllData()" style="color: #e74c3c; text-decoration: underline; cursor: pointer;">🗑️ Clear All Data</a><br><br>
  <em style="color: rgba(255,255,255,.6);">Open this page on 2 devices side-by-side.<br>Click "Add Test Product" on one device.<br>Watch the other device sync automatically! 🌐</em>
</div>

</body>
</html>
